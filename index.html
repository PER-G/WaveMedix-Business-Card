<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F0EBE4">
<title>WaveMedix – Digital Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Nunito:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --bg:#F0EBE4; --card:#FAF8F5; --navy:#1A1A6C; --navy-dark:#14144F; --navy-muted:#7070A0; --border:rgba(26,26,108,0.07); --text:#2A2A50; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 32px;-webkit-font-smoothing:antialiased;color:var(--text)}
  .header{text-align:center;margin-bottom:14px}
  .header-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:#1a1a6c;letter-spacing:-0.8px}
  .header-sub{font-size:9px;color:var(--navy-muted);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
  .nav-bar{display:flex;gap:3px;margin-bottom:10px;background:rgba(26,26,108,0.04);padding:4px 5px;border-radius:14px;border:1px solid var(--border);flex-wrap:wrap;justify-content:center;max-width:400px}
  .nav-btn{padding:5px 10px;border-radius:10px;background:transparent;border:1.5px solid transparent;cursor:pointer;color:var(--navy-muted);font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;white-space:nowrap;transition:all 0.3s ease}
  .nav-btn.active{padding:5px 13px;background:var(--navy);color:#fff;border-color:var(--navy)}
  .nav-label{font-size:11px;font-weight:600;margin-bottom:14px;color:var(--navy-muted)}
  .standalone .nav-bar,.standalone .nav-label,.standalone .header{display:none}
  .card{width:100%;max-width:390px;background:var(--card);border-radius:28px;position:relative;overflow:hidden;box-shadow:0 2px 30px rgba(26,26,108,0.05),0 1px 2px rgba(26,26,108,0.03);animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(0.98)}to{opacity:1;transform:none}}
  .particle-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .particle-bg canvas{position:absolute;inset:0;width:100%;height:100%}
  .card-content{position:relative;z-index:1;padding:28px 24px 22px;display:flex;flex-direction:column}
  .logo-text{font-family:'Nunito',sans-serif;font-size:23px;font-weight:800;color:#1a1a6c;letter-spacing:-0.8px}
  .logo-sub{font-size:9.5px;color:var(--navy-muted);margin-top:1px;font-weight:500;font-style:italic;letter-spacing:0.2px}
  .sep{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:12px 0}
  .avatar-wrap{display:flex;justify-content:center;margin:4px 0 12px}
  .avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:white;letter-spacing:1.5px;animation:pop 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) both;position:relative;z-index:2}
  @keyframes pop{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
  .name-section{text-align:center;margin-bottom:14px;animation:fu 0.5s 0.25s ease both;position:relative;z-index:2}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .person-name{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-0.4px;line-height:1.15}
  .person-role{font-size:12px;font-weight:600;margin-top:3px}
  .contact-block{background:rgba(250,248,245,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:14px;padding:8px 14px;margin-bottom:12px;border:1px solid var(--border);animation:fu 0.5s 0.35s ease both;position:relative;z-index:2}
  .contact-row{display:flex;align-items:center;gap:10px;padding:6px 0}
  .contact-row:not(:last-child){border-bottom:1px solid var(--border)}
  .contact-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(26,26,108,0.035);border:1px solid var(--border)}
  .contact-label{font-size:7.5px;color:var(--navy-muted);font-weight:600;letter-spacing:1.2px;text-transform:uppercase}
  .contact-value{font-size:11.5px;color:var(--text);font-weight:500;margin-top:0.5px}
  .contact-value a{color:var(--text);text-decoration:none}
  .contact-value a:active{opacity:0.5}
  .action-buttons{display:flex;gap:10px;margin-top:2px;animation:fu 0.5s 0.4s ease both;position:relative;z-index:2}
  .action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border:none;border-radius:12px;color:#fff;font-size:11.5px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.3px;transition:all 0.2s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
  .action-btn:active{transform:scale(0.96);opacity:0.9}
  .btn-icon{font-size:13px}
  .share-svg{width:15px;height:15px;flex-shrink:0}
  .share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A6C;color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
  .share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .qr-section{display:flex;align-items:center;gap:12px;background:rgba(250,248,245,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:14px;padding:12px 14px;border:1px solid var(--border);animation:fu 0.5s 0.45s ease both;position:relative;z-index:2}
  .qr-box{background:#fff;border-radius:10px;padding:6px;flex-shrink:0;border:1px solid var(--border)}
  #qrcode{display:block}
  #qrcode canvas,#qrcode img{border-radius:3px;display:block}
  .qr-label{font-size:6.5px;color:var(--navy-muted);letter-spacing:1.2px;text-transform:uppercase;text-align:center;margin-top:4px;font-weight:600}
  .qr-desc{font-size:10px;color:var(--navy-muted);line-height:1.45;font-weight:500}
  .qr-url{font-size:9px;font-weight:700;margin-top:3px}
  /* Login Screen */
  .login-overlay{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;transition:opacity 0.5s,transform 0.5s}
  .login-overlay.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
  .login-box{background:var(--card);border-radius:28px;padding:40px 32px;max-width:360px;width:100%;box-shadow:0 4px 40px rgba(26,26,108,0.08);text-align:center;animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both}
  .login-logo{margin-bottom:6px}
  .login-tagline{font-size:9.5px;color:var(--navy-muted);letter-spacing:2.5px;text-transform:uppercase;font-weight:600;margin-bottom:28px}
  .login-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px}
  .login-field{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;transition:border 0.2s}
  .login-field:focus{border-color:var(--navy)}
  .login-field::placeholder{color:var(--navy-muted);font-size:13px}
  .login-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--navy);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.3px;transition:all 0.2s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 12px rgba(26,26,108,0.2)}
  .login-btn:active{transform:scale(0.97);opacity:0.9}
  .login-btn:hover{background:var(--navy-dark)}
  .login-error{color:#c0392b;font-size:12px;font-weight:600;margin-top:8px;min-height:18px;transition:opacity 0.3s}
  .login-lock{font-size:32px;margin-bottom:16px}
  .app-content{display:none}
  .app-content.visible{display:flex;flex-direction:column;align-items:center}
</style>
</head>

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

function makeParticles(seed){
  const R=mulberry32(seed);
  const pts=[];
  const NC=6+Math.floor(R()*3);
  const clusters=[];
  // Exclusion zones (normalized): logo, avatar+name+role, contact, qr
  // Main exclusion: name/avatar/role area y 0.22-0.52 center
  for(let i=0;i<NC;i++){
    let cx,cy;
    // Push cluster centers away from the name/role zone
    do {
      cx=0.1+R()*0.8;
      cy=0.05+R()*0.9;
    } while(cy>0.2 && cy<0.55 && cx>0.15 && cx<0.85);
    clusters.push({
      cx, cy,
      rx:0.06+R()*0.1,
      ry:0.04+R()*0.08,
      c1:COLORS[Math.floor(R()*COLORS.length)],
      c2:COLORS[Math.floor(R()*COLORS.length)],
    });
  }
  // Dense particles in clusters
  for(let i=0;i<350;i++){
    const cl=clusters[Math.floor(R()*clusters.length)];
    const a=R()*Math.PI*2;
    const dr=Math.sqrt(R());
    let x=cl.cx+Math.cos(a)*dr*cl.rx;
    let y=cl.cy+Math.sin(a)*dr*cl.ry;
    const col=R()>0.5?cl.c1:cl.c2;
    const sz=2+R()*5;
    const sh=R()<0.5?0:R()<0.7?1:2; // 0=circle,1=tri,2=diamond
    const op=0.3+R()*0.5;
    const rot=R()*360;
    // Drift speed/direction for animation
    const dx=(R()-0.5)*0.15;
    const dy=(R()-0.5)*0.12;
    pts.push({x,y,sz,sh,col,op,rot,dx,dy});
  }
  // Scattered particles everywhere
  for(let i=0;i<60;i++){
    const x=R();const y=R();
    const col=COLORS[Math.floor(R()*COLORS.length)];
    const sz=1.5+R()*3.5;
    const sh=R()<0.5?0:R()<0.75?1:2;
    const op=0.2+R()*0.3;
    const dx=(R()-0.5)*0.1;
    const dy=(R()-0.5)*0.08;
    pts.push({x,y,sz,sh,col,op,rot:R()*360,dx,dy});
  }
  return pts;
}

let particles=[];
let animFrame=null;
let startTime=0;

function drawFrame(canvas,time){
  const ctx=canvas.getContext('2d');
  const w=canvas.width/window.devicePixelRatio;
  const h=canvas.height/window.devicePixelRatio;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const elapsed=(time-startTime)/1000;

  for(const p of particles){
    // Gentle floating motion
    const px=(p.x+Math.sin(elapsed*0.3+p.dx*20)*p.dx*0.5)*w;
    const py=(p.y+Math.cos(elapsed*0.25+p.dy*20)*p.dy*0.4)*h;
    const rot=p.rot+elapsed*8*p.dx;

    // Fade out particles in name/avatar/role zone (y 22%-52%, x 15%-85%)
    const ny=py/h; const nx=px/w;
    let opMul=1;
    if(ny>0.18 && ny<0.56 && nx>0.1 && nx<0.9){
      // Distance from zone center for smooth fade
      const cdy=Math.min(Math.abs(ny-0.18),Math.abs(ny-0.56))/0.06;
      const cdx=Math.min(Math.abs(nx-0.1),Math.abs(nx-0.9))/0.06;
      opMul=Math.min(cdy,cdx,1)*0.15;
    }

    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(rot*Math.PI/180);
    ctx.globalAlpha=p.op*opMul;
    ctx.fillStyle=p.col;

    if(p.sh===0){
      ctx.beginPath();ctx.arc(0,0,p.sz,0,Math.PI*2);ctx.fill();
    }else if(p.sh===1){
      const s=p.sz*1.2;
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*0.866,s*0.5);ctx.lineTo(-s*0.866,s*0.5);ctx.closePath();ctx.fill();
    }else{
      const s=p.sz;
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s,0);ctx.lineTo(0,s);ctx.lineTo(-s,0);ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
  animFrame=requestAnimationFrame(t=>drawFrame(canvas,t));
}

function startAnimation(){
  if(animFrame)cancelAnimationFrame(animFrame);
  const canvas=document.getElementById("particleCanvas");
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  canvas.getContext('2d').scale(dpr,dpr);
  particles=makeParticles(ci*12347+77);
  startTime=performance.now();
  animFrame=requestAnimationFrame(t=>drawFrame(canvas,t));
}

function sel(i){
  ci=i;
  const c=document.getElementById("card");
  c.style.animation="none";c.offsetHeight;
  c.style.animation="cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both";
  renderCard();renderNav();
}

// Init deferred to showApp() after authentication
window.addEventListener('resize',()=>startAnimation());

// Toast notification
function showToast(msg){
  let t=document.querySelector('.share-toast');
  if(!t){t=document.createElement('div');t.className='share-toast';document.body.appendChild(t)}
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Generate vCard file download
function downloadVCard(){
  const p=TEAM[ci];
  const vcard=buildVCard(p);
  const blob=new Blob([vcard],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=p.name.replace(/\s+/g,'_').replace(/Dr\._/,'')+'_WaveMedix.vcf';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ Contact saved');
}

// Share card via native share (iOS/Android share sheet)
async function shareCard(){
  const p=TEAM[ci];
  const shareText=p.name+' | '+p.role+' – WaveMedix AG\n\n'+
    '✉ '+p.email+'\n'+
    '📱 '+p.phone+'\n'+
    '💼 '+p.linkedin+'\n'+
    '🌐 https://www.wavemedix.ai';

  // Check if Web Share API is available AND we're on HTTPS (required for share)
  const isSecure=location.protocol==='https:';

  if(isSecure && navigator.share && navigator.canShare){
    try{
      const vcardStr=buildVCard(p);
      const file=new File([vcardStr],p.name.replace(/\s+/g,'_')+'_WaveMedix.vcf',{type:'text/vcard'});
      const fileData={title:p.name+' – WaveMedix',text:shareText,files:[file]};
      if(navigator.canShare(fileData)){
        await navigator.share(fileData);showToast('✓ Shared');return;
      }
    }catch(e){if(e.name==='AbortError')return}
  }

  if(isSecure && navigator.share){
    try{
      await navigator.share({title:p.name+' – WaveMedix',text:shareText,url:p.linkedin});
      showToast('✓ Shared');return;
    }catch(e){if(e.name==='AbortError')return}
  }

  // Local file / non-HTTPS fallback: open vCard directly (triggers iOS/Android share sheet for .vcf)
  const vcardStr=buildVCard(p);
  const blob=new Blob([vcardStr],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  // On iOS Safari, window.open with a blob triggers the native "Open in..." / share sheet
  const a=document.createElement('a');
  a.href=url;
  a.download=p.name.replace(/\s+/g,'_').replace(/Dr\._/,'')+'_WaveMedix.vcf';
  // Try to open in new tab first (triggers share on iOS), fall back to download
  const w=window.open(url,'_blank');
  if(!w){document.body.appendChild(a);a.click();document.body.removeChild(a)}
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  showToast('✓ Contact card opened – share via AirDrop, Messages, etc.');
}

function buildVCard(p){
  const names=p.name.replace(/^Dr\.\s*/,'').split(' ');
  const last=names.pop();const first=names.join(' ');
  const prefix=p.name.startsWith('Dr.')?'Dr.':'';
  return['BEGIN:VCARD','VERSION:3.0',
    'N:'+last+';'+first+';;'+(prefix?prefix+';':''),
    'FN:'+p.name,'ORG:WaveMedix AG','TITLE:'+p.role,
    'TEL;TYPE=CELL:'+p.phone.replace(/\s/g,''),
    'EMAIL;TYPE=WORK:'+p.email,'URL:https://www.wavemedix.ai',
    'URL;TYPE=LinkedIn:'+p.linkedin,
    'ADR;TYPE=WORK:;;Blonay;;1807;Switzerland',
    'NOTE:WaveMedix AG – Transparent Intelligence for Medical AI\\nLinkedIn: '+p.linkedin,
    'END:VCARD'].join('\r\n');
}
function fallbackCopy(text){
  navigator.clipboard.writeText(text).then(()=>showToast('✓ Copied to clipboard')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('✓ Copied to clipboard');
  });
}
</script>

<script>
// Authentication
const AUTH_USER='Team';
const AUTH_PASS='Wavemedix1';

function attemptLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  if(u===AUTH_USER && p===AUTH_PASS){
    err.textContent='';
    sessionStorage.setItem('wm_auth','1');
    showApp();
  }else{
    err.textContent='Invalid username or password. Please try again.';
    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  }
}

function showApp(){
  const overlay=document.getElementById('loginOverlay');
  const app=document.getElementById('appContent');
  overlay.classList.add('hidden');
  app.classList.add('visible');
  setTimeout(()=>{overlay.style.display='none'},600);
  // Initialize app
  renderNav();renderCard();
}

// Allow Enter key to submit
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')attemptLogin()});
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginPass').focus()});

// Check if already authenticated in this session
if(sessionStorage.getItem('wm_auth')==='1'){
  showApp();
}else{
  document.getElementById('loginUser').focus();
}
</script>
